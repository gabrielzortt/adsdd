<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Dom Corleone</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        section {
            padding: 80px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.6);
            z-index: 999;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(197,160,89,0.3);
        }

        header h1 {
            color: #C5A059;
            font-size: 20px;
        }

        /* HERO */
        .hero {
            height: 100vh;
            position: relative;
        }

        .hero img {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .btn {
            background: #C5A059;
            color: #000;
            padding: 12px 24px;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* GRID */
        .grid {
            display: grid;
            gap: 20px;
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .card {
            background: #111;
            border: 1px solid rgba(197,160,89,0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .card-img {
            aspect-ratio: 4/3;
        }

        .card-body {
            padding: 15px;
            text-align: center;
        }

        /* TEAM */
        .team img {
            aspect-ratio: 1/1;
            border-radius: 50%;
        }

        /* GALLERY */
        .gallery img {
            aspect-ratio: 1/1;
            border-radius: 10px;
        }

        /* PROMO */
        .promo {
            text-align: center;
            border: 2px solid #C5A059;
            border-radius: 10px;
        }

        .promo.active {
            background: #1a2a1a;
            border-color: #00ff88;
        }

        .price {
            font-size: 28px;
            margin: 10px 0;
        }

        .old {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            border-top: 1px solid rgba(197,160,89,0.3);
        }

        /* ANIMATION */
        .fade {
            opacity: 0;
            transform: translateY(30px);
            transition: 0.6s;
        }

        .fade.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<header>
    <h1>Dom Corleone</h1>
</header>

<section class="hero">
    <img src="1000184169.png" alt="">
    <div class="overlay"></div>

    <div class="hero-content">
        <h2>Elegância. Respeito. Poder.</h2>
        <a href="https://wa.me/" class="btn">Agendar Agora</a>
    </div>
</section>

<section class="fade">
    <div class="container">
        <h2 style="text-align:center;margin-bottom:30px;">Serviços</h2>

        <div class="grid grid-3">
            <div class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70" alt="">
                </div>
                <div class="card-body">
                    <h3>Corte Supremo</h3>
                </div>
            </div>

            <div class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1517832606299-7ae9b720a186" alt="">
                </div>
                <div class="card-body">
                    <h3>Barba de Respeito</h3>
                </div>
            </div>

            <div class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a" alt="">
                </div>
                <div class="card-body">
                    <h3>O Capo</h3>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="fade team">
    <div class="container">
        <h2 style="text-align:center;margin-bottom:30px;">A Família</h2>

        <div class="grid grid-3">
            <div class="card">
                <div class="card-img">
                    <img src="https://randomuser.me/api/portraits/men/32.jpg">
                </div>
                <div class="card-body">
                    <h3>Vito</h3>
                    <p>Mestre Clássico</p>
                </div>
            </div>

            <div class="card">
                <div class="card-img">
                    <img src="https://randomuser.me/api/portraits/men/45.jpg">
                </div>
                <div class="card-body">
                    <h3>Michael</h3>
                    <p>Especialista Moderno</p>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="fade gallery">
    <div class="container">
        <h2 style="text-align:center;margin-bottom:30px;">O Território</h2>

        <div class="grid grid-3">
            <img src="https://images.unsplash.com/photo-1622288432450-277d0fef5ed6">
            <img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1">
            <img src="https://images.unsplash.com/photo-1512690459411-b9245aed614b">
        </div>
    </div>
</section>

<section class="fade">
    <div class="container promo" id="promoBox">
        <h2 id="promoTitle">Oferta do Chefe</h2>
        <p class="price">
            <span class="old">R$45,00</span> 
            <strong id="promoPrice"></strong>
        </p>
        <p id="countdown"></p>
    </div>
</section>

<footer>
    <p>© 2026 Dom Corleone - Todos os direitos reservados</p>
</footer>

<script>
    // FADE IN
    const elements = document.querySelectorAll('.fade');

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add('show');
            }
        });
    });

    elements.forEach(el => observer.observe(el));

    // PROMOÇÃO
    const today = new Date();
    const day = today.getDay();

    const promoBox = document.getElementById('promoBox');
    const title = document.getElementById('promoTitle');
    const price = document.getElementById('promoPrice');
    const countdown = document.getElementById('countdown');

    if(day === 3){ // Quarta
        promoBox.classList.add('active');
        title.innerText = "🔥 OFERTA ATIVA HOJE! 🔥";
        price.innerText = "R$30,00";
        countdown.style.display = "none";
    } else {
        price.innerText = "R$45,00";

        function updateCountdown(){
            const now = new Date();
            let nextWednesday = new Date();

            nextWednesday.setDate(now.getDate() + ((3 + 7 - now.getDay()) % 7));
            nextWednesday.setHours(0,0,0,0);

            if(nextWednesday <= now){
                nextWednesday.setDate(nextWednesday.getDate() + 7);
            }

            const diff = nextWednesday - now;

            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff / (1000*60*60)) % 24);
            const minutes = Math.floor((diff / (1000*60)) % 60);

            countdown.innerText = `Falta ${days}d ${hours}h ${minutes}m para a próxima oferta`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    }
</script>

</body>
    </html>
